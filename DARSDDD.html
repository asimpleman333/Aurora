<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DARS Volumetric — Canvas 2D</title>
<style>
body { margin:0; background:#000; overflow:hidden; }
#hud {
  position:fixed; top:20px; left:20px;
  padding:10px 14px;
  background:rgba(0,0,0,0.82);
  color:#ccc; font-family:monospace;
  font-size:12px; line-height:1.4;
  border:1px solid #444;
  pointer-events:none; white-space:pre;
  max-width:420px;
}
</style>
</head>
<body>
<div id="hud">Loading…</div>
<canvas id="c"></canvas>

<script>
// ------------------------------------------------------------
// Canvas + Memory
// ------------------------------------------------------------
const hud = document.getElementById("hud");
const c   = document.getElementById("c");
const ctx = c.getContext("2d");

const mem    = document.createElement("canvas");
const memCtx = mem.getContext("2d");

let w, h;
function resize() {
  w = c.width  = innerWidth;
  h = c.height = innerHeight;
  mem.width  = w;
  mem.height = h;
}
addEventListener("resize", resize);
resize();

// ------------------------------------------------------------
// Globals (autonom, kein Input)
// ------------------------------------------------------------
let t = 0;
let phaseLock = 0;
let memEnergy = 0;

// ------------------------------------------------------------
// Operator-Parameter
// ------------------------------------------------------------
let opWeights = { A1:1, A2:1, B1:1, B2:1 };
let opFreq    = { A1:10, A2:15, B1:9, B2:14 };

let opMutRate = 0.003;
let warpBase  = 0.6;
let stability = 0.5;

// ------------------------------------------------------------
// Fake-Audio (minimal, autonom)
// ------------------------------------------------------------
function getAudioSignals() {
  const tt = t * 1.3;
  return {
    a1: 0.4 + 0.3 * Math.sin(tt*0.4),
    a2: 0.3 + 0.4 * Math.abs(Math.sin(tt*1.3)),
    b1: 0.2 + 0.5 * Math.abs(Math.sin(tt*2.7)),
    b2: 0.1 + 0.9 * Math.max(0, Math.sin(tt*4.0)),
    mode: "LOUD"
  };
}

// ------------------------------------------------------------
// Feld-Operatoren
// ------------------------------------------------------------
function A1(x,y,t,a){return Math.sin(x*opFreq.A1+y*20+t*0.10+phaseLock)*a.a1*opWeights.A1;}
function A2(x,y,t,a){return Math.sin(x*opFreq.A2+y*9 +t*0.07+phaseLock*0.7)*a.a2*opWeights.A2;}
function B1(x,y,t,a){return Math.sin(x*opFreq.B1+y*17+t*0.10-phaseLock*0.5)*a.b1*opWeights.B1;}
function B2(x,y,t,a){return Math.sin(x*opFreq.B2+y*20+t*0.08-phaseLock*0.3)*a.b2*opWeights.B2;}

function sampleField(nx, ny, t, a) {
  const a1=A1(nx,ny,t,a), a2=A2(nx,ny,t,a), b1=B1(nx,ny,t,a), b2=B2(nx,ny,t,a);
  const X=a1-b1, Y=a2-b2;
  return { v:Math.sqrt(X*X+Y*Y), a1,a2,b1,b2 };
}

function buildField(cols, rows, t, audio) {
  const a = { a1:audio.a1, a2:audio.a2, b1:audio.b1, b2:audio.b2 };
  const field=[], coreRadius=8;
  const cx=(cols-1)/2, cy=(rows-1)/2;
  let maxV=0, sumV=0, coreSum=0, coreCount=0;

  for(let j=0;j<rows;j++){
    field[j]=[];
    for(let i=0;i<cols;i++){
      const f=sampleField(i/(cols-1), j/(rows-1), t, a);
      field[j][i]=f;
      sumV+=f.v; if(f.v>maxV) maxV=f.v;

      const dx=i-cx, dy=j-cy;
      if(dx*dx+dy*dy<=coreRadius*coreRadius){coreSum+=f.v; coreCount++;}
    }
  }

  const norm=maxV||1;
  for(let j=0;j<rows;j++)for(let i=0;i<cols;i++)field[j][i].v/=norm;

  return {
    field,
    maxV,
    meanV: sumV/(cols*rows),
    coreStrength: coreCount? (coreSum/coreCount)/norm : 0
  };
}

// ------------------------------------------------------------
// Memory
// ------------------------------------------------------------
function updateMemEnergy() {
  try {
    const d = memCtx.getImageData((w/2)|0,(h/2)|0,1,1).data;
    const e = (d[0]+d[1]+d[2])/(3*255);
    memEnergy = memEnergy*0.9 + e*0.1;
  } catch(e) {
    memEnergy *= 0.95;
  }
}
// ------------------------------------------------------------
// Adaptive (leicht, autonom)
// ------------------------------------------------------------
function updateAdaptive(meta) {
  const { core, meanV } = meta;

  // Stabilität
  let targetStability = 0.5;
  if(meanV>0.55 && meanV<0.85) targetStability+=0.3;
  if(core>0.6) targetStability+=0.1;
  if(meanV<0.25 || meanV>0.95) targetStability-=0.3;
  stability = stability*0.9 + targetStability*0.1;

  // Mutation
  const desiredMut =
    stability>0.7 ? 0.006 :
    stability<0.3 ? 0.001 :
    0.003;
  opMutRate = opMutRate*0.9 + desiredMut*0.1;

  // Weights
  opWeights.A1 = 0.8 + 0.8*memEnergy;
  opWeights.A2 = 0.8 + 0.8*memEnergy;
  opWeights.B1 = 1.2 - 0.7*core;
  opWeights.B2 = 1.2 - 0.7*core;

  for(const k in opWeights)
    opWeights[k] = Math.max(0.3, Math.min(1.8, opWeights[k]));

  // Frequenzen
  const spread = 1 + 1.5*(stability-0.5);
  opFreq.A1 = 10*(1+spread*0.15);
  opFreq.A2 = 15*(1-spread*0.10);
  opFreq.B1 = 9 *(1-spread*0.12);
  opFreq.B2 = 14*(1+spread*0.18);

  // Warp
  warpBase = 0.4 + 1.6*memEnergy + 0.6*(stability-0.5);
  warpBase = Math.max(0.2, Math.min(3.0, warpBase));
}

// ------------------------------------------------------------
// Render (echtes Volumen)
// ------------------------------------------------------------
function drawFrame(audio) {
  ctx.clearRect(0,0,w,h);

  const cols=70, rows=70, layers=48; // mehr Schichten = mehr Tiefe
  const metrics = buildField(cols, rows, t, audio);
  const core    = metrics.coreStrength;

  updateAdaptive({
    core,
    meanV: metrics.meanV
  });

  // Phase-Lock
  const targetPhase = (core + memEnergy*0.7)*2*Math.PI;
  phaseLock = phaseLock*0.92 + targetPhase*0.08;

  const cx=w*0.5, cy=h*0.55;
  const baseScale=Math.min(w,h)*0.33;
  const scale = baseScale*(0.8 + 0.4*memEnergy + 0.2*(stability-0.5));
  const warp  = warpBase;

  function proj(x,y,z){
    let X=x-0.5, Y=y-0.5;
    const r2=X*X+Y*Y;
    const f=1/(1+warp*r2);
    X*=f; Y*=f;

    // leichte Rotation für 3D-Effekt
    const rot = t*0.15;
    const xr = X*Math.cos(rot) - Y*Math.sin(rot);
    const yr = X*Math.sin(rot) + Y*Math.cos(rot);

    return [
      cx + (xr - yr)*0.7*scale + z*0.4*scale,
      cy + (xr + yr)*0.4*scale - z*0.8*scale
    ];
  }

  const field=metrics.field;
  const depth=0.8;
  const densityMod=0.75+0.25*(0.5+0.5*Math.sin(t*0.1));

  for(let k=layers-1;k>=0;k--){
    const lt=k/(layers-1);
    const z=lt*depth;

    for(let j=0;j<rows;j++){
      for(let i=0;i<cols;i++){
        const f=field[j][i];
        if(f.v*densityMod<lt) continue;

        const [px,py]=proj(i/(cols-1), j/(rows-1), z);

        let R=(f.b1+f.b2*0.7)*255*(0.5+1.0*f.v);
        let G=(f.a2+f.b2*0.7)*255*(0.5+1.0*f.v);
        let B=(f.a1+f.b2*0.7)*255*(0.5+1.0*f.v);

        const alpha = 0.015 + 0.09*(1-lt)*(0.6+0.4*f.v);

        ctx.fillStyle=`rgba(${R|0},${G|0},${B|0},${alpha})`;
        ctx.fillRect(px,py,2,2);
      }
    }
  }

  memCtx.globalAlpha=0.04;
  memCtx.drawImage(c,0,0);
  ctx.drawImage(mem,0,0);

  updateMemEnergy();

  hud.textContent = `

This file runs in plain HTML5 Canvas 2D — no WebGL, no libraries,
no engine, no embedding. You can open it directly in any browser.

Two 1D signals (fake audio in this demo) drive a self-organizing
2D operator field. By drawing this field across multiple synthetic
depth layers, the image appears volumetric even though everything
is computed in flat 2D space.

It may take a few seconds before the pattern stabilizes. Emergence
doesn't rush. (asimpleman333)

---------------------------
t: ${t.toFixed(2)}
core: ${core.toFixed(3)}
memE: ${memEnergy.toFixed(3)}
stab: ${stability.toFixed(3)}
warp: ${warpBase.toFixed(2)}
`.trim();
}

// ------------------------------------------------------------
// Loop
// ------------------------------------------------------------
function loop(){
  const audio=getAudioSignals();
  t += 0.012;
  drawFrame(audio);
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
